<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websy Clone</title>
    <style>
        /* =========================================
           1. الإعدادات الأساسية (Reset & Base)
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505; /* لون خلفية أسود داكن جداً */
            color: #ffffff; /* نص أبيض */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden; /* منع التمرير الأفقي */
        }

        /* خط مخصص للأسعار والأرقام ليعطي طابع الفيديو */
        .mono-font {
            font-family: 'Courier New', Courier, monospace;
        }

        /* =========================================
           2. شاشة التحميل (Loader)
           ========================================= */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out; /* حركة اختفاء سلسة */
        }

        #loader span {
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* =========================================
           3. خلفية النجوم (Canvas Stars)
           ========================================= */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* لجعل النجوم خلف المحتوى */
        }

        /* =========================================
           4. القائمة العلوية (Navigation)
           ========================================= */
        nav {
            padding: 30px 50px;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: bold;
        }

        nav a:hover {
            color: #aaa;
        }

        /* =========================================
           5. التصميم العام والحاويات (Layout)
           ========================================= */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 50px;
        }

        .section-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* إخفاء الصفحات لعمل نظام تنقل سلس */
        .view {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }
        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           6. شبكة المنتجات (Product Grid)
           ========================================= */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .product-card {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px); /* حركة خفيفة عند تمرير الماوس */
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background-color: #1a1a1a;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .product-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 14px;
            color: #cccccc;
        }

        /* =========================================
           7. صفحة تفاصيل المنتج (Product Page)
           ========================================= */
        .product-details-container {
            display: flex;
            gap: 50px;
            margin-top: 50px;
        }

        .product-details-image {
            flex: 1;
            background-color: #1a1a1a;
            border-radius: 10px;
            aspect-ratio: 3/4;
            object-fit: cover;
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-info h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .product-info .price {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quantity-selector button {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .add-to-cart-btn {
            background-color: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            width: 100%;
            max-width: 300px;
        }

        .add-to-cart-btn:hover {
            background-color: #fff;
            color: #000;
        }

        .size-chart {
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            color: #aaa;
        }

        /* للتوافق مع شاشات الهواتف */
        @media (max-width: 768px) {
            .product-details-container {
                flex-direction: column;
            }
            nav {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <span class="mono-font">100%_LOADED</span>
    </div>

    <canvas id="star-canvas"></canvas>

    <nav>
        <a href="#" onclick="showView('home')">HOME</a>
        <a href="#" onclick="showView('home')">CATALOG</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="container">

        <div id="home-view" class="view active">
            <h2 class="section-title">Featured collection</h2>
            
            <div class="product-grid">
                <div class="product-card" onclick="showView('product')">
                    <img src="https://via.placeholder.com/500x500/1a1a1a/ffffff?text=T-Shirt+1" alt="Shirt 1" class="product-image">
                    <h3>Inside my mind6</h3>
                    <p class="product-price mono-font">LE 900.00 EGP</p>
                </div>

                <div class="product-card" onclick="showView('product')">
                    <img src="https://via.placeholder.com/500x500/1a1a1a/ffffff?text=T-Shirt+2" alt="Shirt 2" class="product-image">
                    <h3>All we need is</h3>
                    <p class="product-price mono-font">LE 900.00 EGP</p>
                </div>

                <div class="product-card" onclick="showView('product')">
                    <img src="https://via.placeholder.com/500x500/1a1a1a/ffffff?text=T-Shirt+3" alt="Shirt 3" class="product-image">
                    <h3>Dark Souls</h3>
                    <p class="product-price mono-font">LE 900.00 EGP</p>
                </div>
                
                <div class="product-card" onclick="showView('product')">
                    <img src="https://via.placeholder.com/500x500/1a1a1a/ffffff?text=T-Shirt+4" alt="Shirt 4" class="product-image">
                    <h3>Lost Boy</h3>
                    <p class="product-price mono-font">LE 900.00 EGP</p>
                </div>
            </div>
        </div>

        <div id="product-view" class="view">
            <div class="product-details-container">
                <img src="https://via.placeholder.com/600x800/1a1a1a/ffffff?text=Inside+my+mind6" alt="Inside my mind6" class="product-details-image">
                
                <div class="product-info">
                    <h1>Inside my mind6</h1>
                    <p class="price mono-font">LE 900.00 EGP</p>
                    
                    <p style="margin-bottom: 10px; font-size: 14px;">Quantity</p>
                    <div class="quantity-selector">
                        <button onclick="changeQty(-1)">-</button>
                        <span id="qty" class="mono-font">1</span>
                        <button onclick="changeQty(1)">+</button>
                    </div>

                    <button class="add-to-cart-btn">ADD TO CART</button>
                    <p class="size-chart">SIZE CHART</p>
                </div>
            </div>
            
            <h2 class="section-title" style="margin-top: 80px; font-size: 20px;">You may also like</h2>
            <div class="product-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="product-card" onclick="showView('product')">
                    <img src="https://via.placeholder.com/300x300/1a1a1a/ffffff?text=Other+1" class="product-image">
                    <p class="product-price mono-font" style="margin-top:10px">LE 900.00 EGP</p>
                </div>
                <div class="product-card" onclick="showView('product')">
                    <img src="https://via.placeholder.com/300x300/1a1a1a/ffffff?text=Other+2" class="product-image">
                    <p class="product-price mono-font" style="margin-top:10px">LE 900.00 EGP</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. كود إخفاء شاشة التحميل بعد 1.5 ثانية
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 800); // الانتظار حتى تنتهي حركة الاختفاء
            }, 1500); // مدة العرض
        });

        // 2. كود التنقل بين واجهة الكتالوج وواجهة المنتج
        function showView(viewId) {
            // إخفاء كل الواجهات
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            // إظهار الواجهة المطلوبة
            document.getElementById(viewId + '-view').classList.add('active');
            // التمرير لأعلى الصفحة بلطف
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 3. كود تغيير الكمية (الزر + و -)
        let quantity = 1;
        function changeQty(amount) {
            quantity += amount;
            if (quantity < 1) quantity = 1; // لا يمكن أن تكون الكمية أقل من 1
            document.getElementById('qty').innerText = quantity;
        }

        // 4. كود رسم النجوم المتحركة في الخلفية باستخدام Canvas
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        // ضبط حجم الـ Canvas ليناسب الشاشة
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // إنشاء النجوم
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        // تحريك ورسم النجوم
        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff'; // لون النجوم

            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();

                // تحريك النجمة للأسفل
                star.y += star.speed;

                // إذا خرجت النجمة من الشاشة، أعدها للأعلى
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(animateStars);
        }
        animateStars();
    </script>
</body>
</html>
