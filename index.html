<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMON | CLOTHING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Cairo:wght@400;700&display=swap');

        :root {
            --background-color: #0a0a0a;
            --text-color: #f5f5f5;
            --accent-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* --- 1. قسم الهيدر وخلفية الفيديو --- */
        #hero {
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover; /* يضمن ملء الفيديو للشاشة */
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* تعتيم بسيط فوق الفيديو */
            z-index: 0;
        }

        .hero-content {
            z-index: 1;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .logo-container img {
            max-width: 180px; /* حجم اللوجو */
            height: auto;
            margin-bottom: 20px;
        }

        .hero-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem); /* حجم خط متجاوب */
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- 2. قسم عرض المنتجات --- */
        #shop {
            padding: 100px 5%;
            width: 100%;
        }
        
        .section-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(3rem, 12vw, 8rem);
            text-align: center;
            margin-bottom: 80px;
            text-transform: uppercase;
            opacity: 0; /* يبدأ مخفيًا */
            transform: translateY(50px); /* يبدأ لأسفل قليلاً */
            transition: opacity 1s, transform 1s;
        }

        /* كلاس يضاف بواسطة الجافاسكريبت عند الظهور */
        .section-title.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            opacity: 0; /* يبدأ مخفيًا */
            transform: translateY(50px); /* يبدأ لأسفل قليلاً */
            transition: opacity 0.8s, transform 0.8s;
        }
        
        .product-card.is-visible {
             opacity: 1;
             transform: translateY(0);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .product-image-container {
            width: 100%;
            padding-top: 125%; /* نسبة العرض إلى الارتفاع (4:5) */
            position: relative;
            background-color: #222;
        }

        .product-image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.1rem;
            color: #aaa;
        }

    </style>
</head>
<body>

    <!-- ====================================================== -->
    <!-- ==== القسم الأول: الواجهة الرئيسية مع خلفية الفيديو ==== -->
    <!-- ====================================================== -->
    <header id="hero">
        <!-- طبقة التعتيم -->
        <div class="hero-overlay"></div>

        <!-- 
            !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
            !!!!    ضع رابط الفيديو الخاص بك هنا   !!!!
            !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
        -->
        <video autoplay muted loop playsinline id="bg-video">
            <source src="YOUR_VIDEO_URL.mp4" type="video/mp4">
            <!-- يمكنك إضافة صيغ أخرى للفيديو لدعم متصفحات أكثر -->
            <!-- <source src="YOUR_VIDEO_URL.webm" type="video/webm"> -->
            عذرًا، متصفحك لا يدعم عرض الفيديوهات.
        </video>

        <div class="hero-content">
            <div class="logo-container">
                 <!-- 
                    !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
                    !!!!      ضع رابط اللوجو هنا        !!!!
                    !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
                 -->
                <img src="YOUR_LOGO_URL.png" alt="Demon Logo">
            </div>
            <h1 class="hero-title">DEMON</h1>
        </div>
    </header>

    <!-- ====================================================== -->
    <!-- ======== القسم الثاني: عرض المنتجات (المتجر) ========= -->
    <!-- ====================================================== -->
    <main id="shop">
        <h2 class="section-title">THE COLLECTION</h2>
        <div class="products-grid" id="products-grid-container">
            <!-- سيتم إضافة المنتجات هنا تلقائيًا بواسطة JavaScript -->
        </div>
    </main>

    <script>
        // =================================================================
        // =============  بيانات المنتجات (عدّل هنا)  =======================
        // =================================================================
        // يمكنك إضافة أو حذف المنتجات من هذه القائمة بسهولة
        // 'image' : هو رابط صورة المنتج
        // 'name'  : هو اسم المنتج
        // 'price' : هو سعر المنتج
        // 'url'   : هو الرابط الذي سينتقل إليه المستخدم عند الضغط على المنتج
        // =================================================================

        const productsData = [
            {
                image: 'https://i.pinimg.com/564x/e7/0a/6e/e70a6e87295f70413e1147545e82b3d1.jpg',
                name: 'DEMON HOODIE',
                price: '350.00 SAR',
                url: '#' // ضع رابط صفحة المنتج هنا
            },
            {
                image: 'https://i.pinimg.com/564x/f3/f9/cf/f3f9cfb7f7f90f772e5050f28b7f8c08.jpg',
                name: 'VINTAGE T-SHIRT',
                price: '180.00 SAR',
                url: '#' // ضع رابط صفحة المنتج هنا
            },
            {
                image: 'https://i.pinimg.com/564x/87/49/a0/8749a0d1f42d2a450531572e42442431.jpg',
                name: 'OVERSIZED TEE',
                price: '220.00 SAR',
                url: '#' // ضع رابط صفحة المنتج هنا
            },
            {
                image: 'https://i.pinimg.com/564x/cc/88/54/cc88544d6a693a2074a3f4a3e8b4e7b8.jpg',
                name: 'WASHED BLACK HOODIE',
                price: '380.00 SAR',
                url: '#' // ضع رابط صفحة المنتج هنا
            },
            {
                image: 'https://i.pinimg.com/564x/48/82/3a/48823a4b910043a50e56f4d0a3d5e236.jpg',
                name: 'GRAPHIC T-SHIRT',
                price: '195.00 SAR',
                url: '#' // ضع رابط صفحة المنتج هنا
            },
            {
                image: 'https://i.pinimg.com/564x/e0/e9/c6/e0e9c609618c7e4e13e9a7e84a29a435.jpg',
                name: 'CARGO PANTS',
                price: '290.00 SAR',
                url: '#' // ضع رابط صفحة المنتج هنا
            },
        ];

        // =================================================================
        // ======== الكود المسؤول عن بناء الموقع (لا داعي لتعديله) ==========
        // =================================================================

        document.addEventListener('DOMContentLoaded', () => {

            // --- بناء شبكة المنتجات ---
            const gridContainer = document.getElementById('products-grid-container');
            if(gridContainer) {
                productsData.forEach(product => {
                    // إنشاء بطاقة المنتج
                    const productCard = document.createElement('a');
                    productCard.href = product.url;
                    productCard.className = 'product-card';

                    // إنشاء محتوى البطاقة
                    productCard.innerHTML = `
                        <div class="product-image-container">
                            <img src="${product.image}" alt="${product.name}" loading="lazy">
                        </div>
                        <div class="product-info">
                            <h3 class="product-name">${product.name}</h3>
                            <p class="product-price">${product.price}</p>
                        </div>
                    `;
                    
                    // إضافة البطاقة إلى الشبكة
                    gridContainer.appendChild(productCard);
                });
            }

            // --- تفعيل الحركات عند التمرير (Scroll Animations) ---
            const animatedElements = document.querySelectorAll('.section-title, .product-card');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, {
                threshold: 0.1 // نسبة ظهور العنصر في الشاشة لبدء الحركة
            });

            animatedElements.forEach(el => {
                observer.observe(el);
            });
        });

    </script>
</body>
</html>
