<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underground | Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #bbbbbb;
            --glow: 0 0 15px rgba(255, 255, 255, 0.4);
            --font-heading: 'Orbitron', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Particles & Background */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
        }

        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        #dynamic-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 5, 0.85); /* Dark overlay for readability */
        }

        /* Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .loader-text {
            font-family: var(--font-heading);
            font-size: 2rem;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite alternate;
        }

        /* Typography & Effects */
        h1, h2, h3 { font-family: var(--font-heading); text-transform: uppercase; letter-spacing: 2px; }
        
        .glitch {
            position: relative;
            cursor: pointer;
            text-transform: uppercase;
            font-family: var(--font-heading);
            letter-spacing: 4px;
            transition: text-shadow 0.3s ease;
        }

        .glitch:hover { text-shadow: var(--glow); }

        .glitch:hover::before, .glitch:hover::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
        }

        .glitch:hover::before {
            left: 2px; text-shadow: -2px 0 #ff00c8;
            animation: glitch-anim 0.3s infinite linear alternate-reverse;
        }

        .glitch:hover::after {
            left: -2px; text-shadow: -2px 0 #00fff2;
            animation: glitch-anim-2 0.3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 44px, 0); } 100% { clip: rect(65px, 9999px, 98px, 0); } }
        @keyframes glitch-anim-2 { 0% { clip: rect(82px, 9999px, 14px, 0); } 100% { clip: rect(21px, 9999px, 88px, 0); } }
        @keyframes pulse { 0% { opacity: 0.5; text-shadow: none; } 100% { opacity: 1; text-shadow: var(--glow); } }

        /* Logo Animation */
        .brand-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        .brand-logo:hover {
            transform: rotate(180deg);
        }

        /* Views / Pages */
        .view {
            display: none;
            opacity: 0;
            min-height: 100vh;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .view.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        /* 1. Landing Page */
        #landing {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #clock {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin: 20px 0;
            letter-spacing: 3px;
            color: var(--accent-color);
        }

        .nav-vertical {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 40px;
            font-size: 1.5rem;
        }

        .social-icons {
            margin-top: auto;
            display: flex;
            gap: 20px;
            padding-bottom: 20px;
        }

        .social-icons i {
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .social-icons i:hover { color: #fff; text-shadow: var(--glow); transform: scale(1.2); }

        /* 2. Shop Page */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .top-bar i { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .top-bar i:hover { text-shadow: var(--glow); }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .category-filter button {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 15px;
            font-family: var(--font-body);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }

        .category-filter button:hover, .category-filter button.active {
            background: #fff;
            color: #000;
            box-shadow: var(--glow);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
            gap: 15px;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .product-card:hover {
            transform: scale(1.03);
            border-color: rgba(255,255,255,0.3);
            box-shadow: var(--glow);
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            margin-bottom: 10px;
            filter: grayscale(20%);
            transition: filter 0.3s;
        }

        .product-card:hover img { filter: grayscale(0%); }
        .product-title { font-size: 0.9rem; margin-bottom: 5px; font-weight: 600; }
        .product-price { font-family: var(--font-heading); font-size: 0.8rem; color: var(--accent-color); }

        /* 3. Product Details Page */
        #product-detail {
            max-width: 800px;
            margin: 0 auto;
            align-items: center;
        }

        .detail-img {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .detail-info { text-align: center; width: 100%; }
        .detail-title { font-size: 2rem; margin-bottom: 10px; }
        .detail-price { font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 5px; }
        .shipping-text { font-size: 0.7rem; color: #888; margin-bottom: 20px; text-transform: uppercase; }

        .qty-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .qty-btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; transition: 0.3s;
        }

        .qty-btn:hover { background: #fff; color: #000; }

        .add-to-cart-btn {
            width: 100%; max-width: 300px;
            padding: 15px;
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            border-radius: 30px;
            font-family: var(--font-heading);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .add-to-cart-btn:hover {
            background: #fff; color: #000; box-shadow: var(--glow);
        }

        .nav-buttons {
            display: flex; justify-content: space-between; width: 100%; margin-top: 30px;
        }

        .nav-buttons button {
            background: none; border: none; color: #888; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .nav-buttons button:hover { color: #fff; text-shadow: var(--glow); }

        /* Cart Sidebar */
        #cart-sidebar {
            position: fixed;
            top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh;
            background: rgba(5,5,5,0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            padding: 20px;
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; flex-direction: column;
        }

        #cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; }
        .cart-close { cursor: pointer; font-size: 1.5rem; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9rem; }
        .cart-total { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; margin-top: 20px; text-align: right; font-family: var(--font-heading); }
        .checkout-btn { width: 100%; padding: 15px; margin-top: 20px; background: #fff; color: #000; border: none; font-family: var(--font-heading); cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="loader-text">SYSTEM_INIT...</h1>
    </div>

    <canvas id="particles-js"></canvas>
    <div id="dynamic-bg"></div>

    <div id="cart-sidebar">
        <div class="cart-header">
            <h2>YOUR CART</h2>
            <i class="fas fa-times cart-close" onclick="toggleCart()"></i>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-total">TOTAL: <span id="cart-total-price">0</span> EGP</div>
        <button class="checkout-btn">SECURE CHECKOUT</button>
    </div>

    <section id="landing" class="view active">
        <img src="" class="brand-logo" alt="BRAND LOGO" onclick="navigate('landing')">
        <div id="clock">00:00:00</div>
        
        <nav class="nav-vertical">
            <div class="glitch" data-text="HOME" onclick="navigate('landing')">HOME</div>
            <div class="glitch" data-text="SHOP ALL" onclick="navigate('shop')">SHOP ALL</div>
            <div class="glitch" data-text="CONTACT">CONTACT</div>
        </nav>

        <div class="social-icons">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
            <i class="fab fa-youtube"></i>
        </div>
    </section>

    <section id="shop" class="view">
        <header class="top-bar">
            <i class="fas fa-bars"></i>
            <img src="" class="brand-logo" style="width: 50px; height: 50px;" alt="LOGO" onclick="navigate('landing')">
            <div style="display: flex; gap: 15px;">
                <i class="fas fa-search"></i>
                <i class="fas fa-shopping-cart" onclick="toggleCart()"></i>
            </div>
        </header>

        <div class="category-filter">
            <button class="active" onclick="filterProducts('All')">Shop All</button>
            <button onclick="filterProducts('Jackets')">Jackets</button>
            <button onclick="filterProducts('Tracksuit')">Tracksuit</button>
        </div>

        <div class="product-grid" id="products-container">
            </div>
    </section>

    <section id="product-detail" class="view">
        <header class="top-bar" style="width: 100%; border:none;">
            <i class="fas fa-arrow-left" onclick="navigate('shop')"></i>
            <i class="fas fa-shopping-cart" onclick="toggleCart()"></i>
        </header>

        <img src="" id="detail-img" class="detail-img" alt="Product">
        
        <div class="detail-info">
            <h1 class="detail-title glitch" id="detail-title" data-text="PRODUCT NAME">PRODUCT NAME</h1>
            <div class="detail-price" id="detail-price">0 EGP</div>
            <div class="shipping-text">Shipping calculated at checkout</div>
            
            <div class="qty-selector">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <span id="detail-qty">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>

            <button class="add-to-cart-btn" onclick="addToCartFromDetail()">ADD TO CART</button>
        </div>

        <div class="nav-buttons">
            <button onclick="prevProduct()">[ PREV ]</button>
            <button onclick="nextProduct()">[ NEXT ]</button>
        </div>
    </section>

    <script>
        /* =======================================================
           USER CUSTOMIZATION VARIABLES
           ======================================================= */
        // 1. Put your logo image link here
        const logoLink = "https://placehold.co/400x400/050505/ffffff?text=LOGO&font=Orbitron"; 
        
        // 2. Put your background image link here (For Shop & Product pages)
        const productsBackground = "https://images.unsplash.com/photo-1558244661-d248897f7bc4?q=80&w=2000&auto=format&fit=crop"; 
        
        /* ======================================================= */

        // Dummy Product Data
        const products = [
            { id: 1, name: "CYBER JACKET V1", price: 3500, category: "Jackets", img: "https://images.unsplash.com/photo-1551028719-0c1440097120?q=80&w=600&auto=format&fit=crop" },
            { id: 2, name: "VOID TRACKSUIT", price: 2800, category: "Tracksuit", img: "https://images.unsplash.com/photo-1611312449408-fcece27cdbb1?q=80&w=600&auto=format&fit=crop" },
            { id: 3, name: "NEON BOMBER", price: 4200, category: "Jackets", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=600&auto=format&fit=crop" },
            { id: 4, name: "STEALTH PANTS", price: 1900, category: "Tracksuit", img: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?q=80&w=600&auto=format&fit=crop" }
        ];

        let currentView = 'landing';
        let currentProductIndex = 0;
        let selectedQty = 1;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Initialization
        window.onload = () => {
            // Set Logos
            document.querySelectorAll('.brand-logo').forEach(img => {
                img.src = logoLink;
            });

            // Set Dynamic Background variable
            document.getElementById('dynamic-bg').style.backgroundImage = `url(${productsBackground})`;

            // Remove Loader
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
            }, 1500);

            startClock();
            initParticles();
            renderProducts('All');
            updateCartUI();
        };

        // Navigation System with Fade Transitions
        function navigate(targetId) {
            document.querySelectorAll('.view').forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.classList.remove('active');
                }, 400); // Wait for fade out
            });

            setTimeout(() => {
                document.getElementById(targetId).classList.add('active');
                // Trigger reflow
                void document.getElementById(targetId).offsetWidth; 
                document.getElementById(targetId).style.opacity = '1';
                
                // Handle Backgrounds
                const dynBg = document.getElementById('dynamic-bg');
                if(targetId === 'shop' || targetId === 'product-detail') {
                    dynBg.style.opacity = '1';
                } else {
                    dynBg.style.opacity = '0';
                }
                
                window.scrollTo({top: 0, behavior: 'smooth'});
            }, 400);

            currentView = targetId;
        }

        // Live Clock
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            }, 1000);
        }

        // Shop Functions
        function renderProducts(category) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            const filtered = category === 'All' ? products : products.filter(p => p.category === category);
            
            filtered.forEach((p, index) => {
                // Find actual index in main array for detail view
                const realIndex = products.findIndex(item => item.id === p.id);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProductDetail(realIndex);
                card.innerHTML = `
                    <img src="${p.img}" loading="lazy" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${p.price} EGP</div>
                `;
                container.appendChild(card);
            });
        }

        function filterProducts(category) {
            document.querySelectorAll('.category-filter button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category);
        }

        // Product Details
        function openProductDetail(index) {
            currentProductIndex = index;
            const product = products[index];
            selectedQty = 1;
            
            document.getElementById('detail-img').src = product.img;
            document.getElementById('detail-title').innerText = product.name;
            document.getElementById('detail-title').setAttribute('data-text', product.name);
            document.getElementById('detail-price').innerText = `${product.price} EGP`;
            document.getElementById('detail-qty').innerText = selectedQty;
            
            navigate('product-detail');
        }

        function updateQty(change) {
            selectedQty += change;
            if(selectedQty < 1) selectedQty = 1;
            document.getElementById('detail-qty').innerText = selectedQty;
        }

        function prevProduct() {
            let newIndex = currentProductIndex - 1;
            if(newIndex < 0) newIndex = products.length - 1;
            openProductDetail(newIndex);
        }

        function nextProduct() {
            let newIndex = currentProductIndex + 1;
            if(newIndex >= products.length) newIndex = 0;
            openProductDetail(newIndex);
        }

        // Cart System
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('open');
        }

        function addToCartFromDetail() {
            const product = products[currentProductIndex];
            const existing = cart.find(item => item.id === product.id);
            
            if(existing) {
                existing.qty += selectedQty;
            } else {
                cart.push({ ...product, qty: selectedQty });
            }
            
            saveCart();
            toggleCart(); // Open cart to show user
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            container.innerHTML = '';
            
            let total = 0;
            
            if(cart.length === 0) {
                container.innerHTML = '<p style="color:#888; text-align:center; margin-top:20px;">Cart is empty.</p>';
            }

            cart.forEach(item => {
                total += item.price * item.qty;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>${item.qty}x ${item.name}</div>
                    <div>
                        ${item.price * item.qty} EGP
                        <i class="fas fa-trash" style="margin-left:10px; cursor:pointer; color:#ff4444;" onclick="removeFromCart(${item.id})"></i>
                    </div>
                `;
                container.appendChild(div);
            });
            
            totalEl.innerText = total;
        }

        // Minimalist Particle Background System
        function initParticles() {
            const canvas = document.getElementById('particles-js');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particlesArray = [];
            const numberOfParticles = window.innerWidth < 768 ? 50 : 150;

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * 1 - 0.5;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.size > 0.2) this.size -= 0.01;
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }
                draw() {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
    </script>
</body>
</html>
