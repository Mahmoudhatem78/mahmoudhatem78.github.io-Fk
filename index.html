<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websy Store Clone</title>
    <style>
        /* * إعدادات التصميم الأساسية (CSS)
         */
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Courier New', Courier, monospace; /* خط مقارب للذي في الفيديو */
            background-color: #000; 
            color: #fff; 
            overflow-x: hidden; 
        }

        /* إعدادات فيديو الخلفية */
        .video-bg { 
            position: fixed; 
            right: 0; 
            bottom: 0; 
            min-width: 100%; 
            min-height: 100%; 
            z-index: -1; /* لضمان بقاء الفيديو في الخلفية دائماً */
            object-fit: cover; 
            opacity: 0.6; /* نسبة الشفافية لكي تظهر المنتجات بوضوح */
        }

        /* تصميم الشاشة الافتتاحية (الواجهة) */
        #splash { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            position: relative; 
            z-index: 10; 
            background: #000; 
        }
        #splash img { 
            max-width: 90%; 
            max-height: 90vh; 
            object-fit: contain;
        }

        /* الحاوية الرئيسية للمتجر */
        #main-app { 
            display: none; /* مخفي في البداية حتى يتم النقر على الواجهة */
            padding: 20px 5%; 
            z-index: 1; 
            position: relative; 
        }

        /* القائمة العلوية (Header) */
        header { 
            display: flex; 
            justify-content: flex-start; 
            padding: 20px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            margin-bottom: 30px;
        }
        header nav a { 
            color: #fff; 
            text-decoration: none; 
            margin-right: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        header nav a:hover { color: #aaa; }

        /* العناوين */
        h1 { text-align: center; font-size: 2.5em; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 1.2em; color: #ccc; margin-bottom: 40px; text-transform: uppercase;}

        /* شبكة المنتجات (Catalog) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px 0; 
        }
        .card { 
            background: transparent; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.3s ease; 
        }
        .card:hover { transform: scale(1.03); } /* تأثير تكبير بسيط عند التمرير بالماوس */
        .card img { 
            width: 100%; 
            height: auto; 
            border-radius: 5px; 
            background-color: #111; /* لون خلفية بديل للصورة */
        }
        .card h3 { margin: 15px 0 5px 0; font-size: 1.1em; }
        .price { color: #fff; font-weight: bold; margin: 0; font-size: 0.9em;}

        /* صفحة تفاصيل المنتج الواحد */
        #product-page { display: none; padding: 40px 0; }
        .product-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 50px; 
            justify-content: center; 
        }
        .product-image { flex: 1; min-width: 300px; max-width: 450px; }
        .product-image img { width: 100%; border-radius: 10px; background-color: #111; }
        
        .product-details { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: flex-start; }
        .product-details h1 { text-align: left; margin-top: 0; font-size: 2em; }
        .product-details .price-large { color: #ccc; font-size: 1.2em; margin-bottom: 30px; }
        
        .quantity { margin: 20px 0 30px 0; display:flex; align-items: center; gap: 15px;}
        .quantity label { text-transform: uppercase; font-size: 0.9em; }
        .quantity input { 
            width: 60px; 
            padding: 12px; 
            text-align: center; 
            background: transparent; 
            color: #fff; 
            border: 1px solid #fff; 
            font-size: 1em;
        }

        /* زر الإضافة للسلة */
        .btn { 
            background: #fff; 
            color: #000; 
            border: 1px solid #fff; 
            padding: 15px; 
            cursor: pointer; 
            font-size: 1em; 
            text-transform: uppercase; 
            font-weight: bold;
            transition: all 0.3s; 
            width: 100%;
            max-width: 300px;
        }
        .btn:hover { background: #000; color: #fff; }
        
        .size-chart { 
            background: transparent; 
            border: none; 
            color: #fff; 
            text-decoration: underline; 
            text-align: left; 
            padding-left: 0; 
            margin-top: 15px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="splash" onclick="enterStore()">
        <img src="https://via.placeholder.com/800x600/000000/FFFFFF?text=CLICK+TO+ENTER" alt="Enter Store">
    </div>

    <div id="main-app">
        
        <video autoplay muted loop playsinline class="video-bg" id="bg-video">
            <source src="ضع_رابط_الفيديو_هنا.mp4" type="video/mp4">
        </video>
        <header>
            <nav>
                <a onclick="showCatalog()">HOME</a>
                <a onclick="showCatalog()">CATALOG</a>
                <a href="#">CONTACT</a>
            </nav>
        </header>

        <div id="catalog-page">
            <h1>Inside my mind</h1>
            <div class="subtitle">Featured collection</div>
            
            <div class="grid">
                <div class="card" onclick="showProduct('Inside my mind 1', 'LE 999.00 EGP', 'https://via.placeholder.com/500x500/111/fff?text=T-Shirt+1')">
                    <img src="https://via.placeholder.com/500x500/111/fff?text=T-Shirt+1" alt="Shirt 1">
                    <h3>Inside my mind</h3>
                    <p class="price">LE 999.00 EGP</p>
                </div>
                
                <div class="card" onclick="showProduct('Inside my mind 2', 'LE 999.00 EGP', 'https://via.placeholder.com/500x500/111/fff?text=T-Shirt+2')">
                    <img src="https://via.placeholder.com/500x500/111/fff?text=T-Shirt+2" alt="Shirt 2">
                    <h3>Inside my mind</h3>
                    <p class="price">LE 999.00 EGP</p>
                </div>
                
                <div class="card" onclick="showProduct('Inside my mind 3', 'LE 999.00 EGP', 'https://via.placeholder.com/500x500/111/fff?text=T-Shirt+3')">
                    <img src="https://via.placeholder.com/500x500/111/fff?text=T-Shirt+3" alt="Shirt 3">
                    <h3>Inside my mind</h3>
                    <p class="price">LE 999.00 EGP</p>
                </div>
            </div>
        </div>

        <div id="product-page">
            <div class="product-container">
                <div class="product-image">
                    <img id="detail-img" src="" alt="Product Detail">
                </div>
                <div class="product-details">
                    <h1 id="detail-title">Title</h1>
                    <div class="price-large" id="detail-price">Price</div>
                    
                    <div class="quantity">
                        <label>Quantity</label>
                        <input type="number" value="1" min="1">
                    </div>
                    
                    <button class="btn">Add to cart</button>
                    <button class="size-chart">Size Chart</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // دالة الدخول للمتجر من الشاشة الافتتاحية
        function enterStore() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showCatalog();
        }

        // دالة العودة لصفحة المنتجات
        function showCatalog() {
            window.scrollTo(0, 0);
            document.getElementById('catalog-page').style.display = 'block';
            document.getElementById('product-page').style.display = 'none';
        }

        // دالة فتح منتج معين وعرض تفاصيله
        function showProduct(title, price, imageSrc) {
            window.scrollTo(0, 0);
            document.getElementById('catalog-page').style.display = 'none';
            document.getElementById('product-page').style.display = 'block';

            // تغيير بيانات الصفحة بناءً على المنتج الذي تم الضغط عليه
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-price').innerText = price;
            document.getElementById('detail-img').src = imageSrc;
        }
    </script>
</body>
</html>
