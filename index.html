<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID | Underground Streetwear</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --glow-color: rgba(255, 255, 255, 0.4);
            --accent-color: #ff003c; /* subtle cyberpunk accent */
            --font-heading: 'Orbitron', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --transition-speed: 0.4s;
        }

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
        }

        button {
            cursor: pointer;
            font-family: var(--font-heading);
            border: none;
            background: none;
            color: var(--text-main);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s ease-out;
        }

        .loader-text {
            font-size: 2rem;
            letter-spacing: 10px;
            animation: pulseGlow 1.5s infinite alternate;
        }

        @keyframes pulseGlow {
            from { text-shadow: 0 0 5px var(--glow-color); opacity: 0.5; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #fff; opacity: 1; }
        }

        /* Particles Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
            background: #050505;
        }

        #dynamic-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            opacity: 0.3; /* Subtle overlay */
            transition: opacity 1s ease;
            pointer-events: none;
        }

        /* Page Container & Transitions */
        .page {
            display: none;
            min-height: 100vh;
            width: 100%;
            animation: fadeIn var(--transition-speed) ease-in-out forwards;
            padding-bottom: 50px;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glitch Hover Effect */
        .glitch-hover {
            position: relative;
            display: inline-block;
            transition: color 0.3s;
        }
        
        .glitch-hover::before, .glitch-hover::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        .glitch-hover:hover::before {
            left: 2px;
            text-shadow: -1px 0 red;
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            opacity: 1;
        }

        .glitch-hover:hover::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
            opacity: 1;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 80% 0); }
            20% { clip-path: inset(80% 0 5% 0); }
            40% { clip-path: inset(30% 0 40% 0); }
            60% { clip-path: inset(70% 0 15% 0); }
            80% { clip-path: inset(20% 0 60% 0); }
            100% { clip-path: inset(50% 0 30% 0); }
        }

        /* ---------------- LANDING PAGE ---------------- */
        #landing-page {
            display: flex; /* overridden by JS to show/hide */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .landing-logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 15px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .digital-clock {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .vertical-nav {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .vertical-nav a {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .social-icons {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 30px;
        }

        .social-icons a {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .social-icons a:hover {
            color: var(--text-main);
            transform: translateY(-5px);
            text-shadow: 0 0 10px #fff;
        }

        /* ---------------- PRODUCTS PAGE ---------------- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            background: rgba(5,5,5,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .top-bar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .top-bar-icons i {
            margin-left: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .top-bar-icons i:hover {
            text-shadow: 0 0 10px #fff;
        }

        .cart-icon-wrapper {
            position: relative;
            display: inline-block;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--text-main);
            color: var(--bg-color);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 50%;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            overflow-x: auto;
        }

        .category-filter button {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
        }

        .category-filter button.active, .category-filter button:hover {
            color: var(--text-main);
            text-shadow: 0 0 8px var(--glow-color);
        }

        .category-filter button.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--text-main);
            box-shadow: 0 0 5px #fff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 5%;
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }

        .product-card {
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 0px var(--glow-color);
            transition: box-shadow 0.4s ease;
            z-index: 1;
            pointer-events: none;
        }

        .product-card:hover {
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.05);
        }

        .product-card:hover::before {
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
        }

        .product-img-wrapper {
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: grayscale(20%) contrast(1.1);
        }

        .product-card:hover .product-img {
            transform: scale(1.08);
            filter: grayscale(0%) contrast(1.2);
        }

        .product-name {
            font-size: 0.9rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .product-price {
            font-family: var(--font-body);
            font-weight: 300;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ---------------- PRODUCT DETAILS PAGE ---------------- */
        .product-details-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 5%;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .details-img-wrapper {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            margin-bottom: 30px;
            position: relative;
        }
        
        .details-img-wrapper::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 20px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(5px);
        }

        .details-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .details-name {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .details-price {
            font-family: var(--font-body);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .shipping-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-style: italic;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 25px;
        }

        .qty-btn {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .qty-btn:hover {
            color: var(--text-main);
            text-shadow: 0 0 5px #fff;
        }

        .qty-num {
            font-family: var(--font-body);
            font-size: 1.1rem;
            min-width: 20px;
        }

        .add-to-cart-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 15px 40px;
            font-size: 1rem;
            letter-spacing: 3px;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
            margin-bottom: 40px;
        }

        .add-to-cart-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.1);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .add-to-cart-btn:hover {
            box-shadow: 0 0 20px rgba(255,255,255,0.4), inset 0 0 10px rgba(255,255,255,0.2);
            text-shadow: 0 0 5px #fff;
        }

        .add-to-cart-btn:hover::before {
            left: 0;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .nav-btn {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-btn:hover {
            color: var(--text-main);
            text-shadow: 0 0 5px var(--glow-color);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: var(--font-body);
            font-weight: 600;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

    </style>
</head>
<body>

    <!-- Dynamic Background Elements -->
    <div id="particles-js"></div>
    <div id="dynamic-bg"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <h1 class="loader-text">VOID</h1>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Added to Cart</div>

    <!-- 1. LANDING PAGE -->
    <section id="landing-page" class="page active">
        <h1 class="landing-logo glitch-hover" data-text="VOID">VOID</h1>
        <div class="digital-clock" id="clock">00:00:00 AM</div>
        
        <nav class="vertical-nav">
            <a href="#" class="glitch-hover" data-text="HOME" onclick="navigate('landing-page')">HOME</a>
            <a href="#" class="glitch-hover" data-text="SHOP ALL" onclick="navigate('products-page')">SHOP ALL</a>
            <a href="#" class="glitch-hover" data-text="CONTACT">CONTACT</a>
        </nav>

        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </section>

    <!-- 2. PRODUCTS PAGE -->
    <section id="products-page" class="page">
        <header class="top-bar">
            <div class="top-bar-icons">
                <i class="fas fa-bars" onclick="navigate('landing-page')"></i>
            </div>
            <div class="top-bar-logo" style="cursor:pointer;" onclick="navigate('landing-page')">VOID</div>
            <div class="top-bar-icons">
                <i class="fas fa-search"></i>
                <div class="cart-icon-wrapper">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
            </div>
        </header>

        <div class="category-filter">
            <button class="active">SHOP ALL</button>
            <button>JACKETS</button>
            <button>TRACKSUIT</button>
            <button>ACCESSORIES</button>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products injected by JS -->
        </div>
    </section>

    <!-- 3. PRODUCT DETAILS PAGE -->
    <section id="product-details-page" class="page">
        <header class="top-bar">
            <div class="top-bar-icons">
                <i class="fas fa-arrow-left" onclick="navigate('products-page')"></i>
            </div>
            <div class="top-bar-logo" style="cursor:pointer;" onclick="navigate('landing-page')">VOID</div>
            <div class="top-bar-icons">
                <div class="cart-icon-wrapper">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count-details">0</span>
                </div>
            </div>
        </header>

        <div class="product-details-container">
            <div class="details-img-wrapper">
                <img src="" alt="Product" class="details-img" id="detail-img">
            </div>
            
            <h1 class="details-name" id="detail-name">PRODUCT NAME</h1>
            <div class="details-price" id="detail-price">0 EGP</div>
            <div class="shipping-text">Shipping calculated at checkout</div>

            <div class="quantity-selector">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <span class="qty-num" id="detail-qty">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>

            <button class="add-to-cart-btn" onclick="addToCart()">ADD TO CART</button>

            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevProduct()"><i class="fas fa-chevron-left"></i> PREVIOUS</button>
                <button class="nav-btn" onclick="nextProduct()">NEXT <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        // --- CUSTOMIZABLE BACKGROUND ---
        // Change this variable to dynamically update the background for shop & product pages
        const productsBackground = "https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=2070&auto=format&fit=crop"; 
        
        // Product Data
        const products = [
            { id: 1, name: "CYBER-TRENCH V1", price: "4,500", image: "https://images.unsplash.com/photo-1550639525-c97d455acf70?w=500&auto=format&fit=crop" },
            { id: 2, name: "NEON DRIFTER HOODIE", price: "2,200", image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500&auto=format&fit=crop" },
            { id: 3, name: "VOID TRACKSUIT", price: "3,800", image: "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=500&auto=format&fit=crop" },
            { id: 4, name: "SYNTH CARGO PANTS", price: "2,900", image: "https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?w=500&auto=format&fit=crop" }
        ];

        let currentProductId = null;
        let cart = JSON.parse(localStorage.getItem('void_cart')) || [];
        let currentQty = 1;

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            // Apply dynamic background
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${productsBackground}')`;
            
            // Generate Products
            const grid = document.getElementById('product-grid');
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProductDetails(p.id);
                card.innerHTML = `
                    <div class="product-img-wrapper">
                        <img src="${p.image}" alt="${p.name}" class="product-img" loading="lazy">
                    </div>
                    <h3 class="product-name">${p.name}</h3>
                    <div class="product-price">${p.price} EGP</div>
                `;
                grid.appendChild(card);
            });

            updateCartDisplay();
            startClock();
            initParticles();

            // Remove loading screen
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 2000);
        });

        // Navigation System
        function navigate(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            const targetPage = document.getElementById(pageId);
            targetPage.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Handle background opacity based on page
            const dynamicBg = document.getElementById('dynamic-bg');
            if(pageId === 'landing-page') {
                dynamicBg.style.opacity = '0';
            } else {
                dynamicBg.style.opacity = '0.2';
            }
        }

        // Product Details Logic
        function openProductDetails(id) {
            currentProductId = id;
            const product = products.find(p => p.id === id);
            
            document.getElementById('detail-img').src = product.image;
            document.getElementById('detail-name').innerText = product.name;
            document.getElementById('detail-price').innerText = `${product.price} EGP`;
            
            currentQty = 1;
            document.getElementById('detail-qty').innerText = currentQty;
            
            navigate('product-details-page');
        }

        function updateQty(change) {
            if(currentQty + change >= 1 && currentQty + change <= 10) {
                currentQty += change;
                document.getElementById('detail-qty').innerText = currentQty;
            }
        }

        function prevProduct() {
            let index = products.findIndex(p => p.id === currentProductId);
            index = (index - 1 + products.length) % products.length;
            openProductDetails(products[index].id);
        }

        function nextProduct() {
            let index = products.findIndex(p => p.id === currentProductId);
            index = (index + 1) % products.length;
            openProductDetails(products[index].id);
        }

        // Cart System
        function addToCart() {
            const product = products.find(p => p.id === currentProductId);
            const existingItem = cart.find(item => item.id === product.id);
            
            if(existingItem) {
                existingItem.qty += currentQty;
            } else {
                cart.push({ ...product, qty: currentQty });
            }
            
            localStorage.setItem('void_cart', JSON.stringify(cart));
            updateCartDisplay();
            showToast();
        }

        function updateCartDisplay() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalItems;
            document.getElementById('cart-count-details').innerText = totalItems;
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Digital Clock
        function startClock() {
            const clockEl = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                let timeString = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute:'2-digit', second:'2-digit' });
                let dateString = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                clockEl.innerText = `${timeString} // ${dateString}`.toUpperCase();
            }, 1000);
        }

        // Basic Particle Simulation using HTML5 Canvas (Minimal embedded script)
        function initParticles() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            document.getElementById('particles-js').appendChild(canvas);
            
            let particles = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.5;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.speedX = Math.random() * 0.5 - 0.25;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    if(this.y > canvas.height) this.y = 0;
                    if(this.y < 0) this.y = canvas.height;
                    if(this.x > canvas.width) this.x = 0;
                    if(this.x < 0) this.x = canvas.width;
                }
                draw() {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for(let i=0; i<100; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
