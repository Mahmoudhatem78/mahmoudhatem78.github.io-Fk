<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streetwear Space Theme</title>
    <style>
        /* --- الأساسيات --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* خط يشبه الفيديو */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #fff;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- خلفية النجوم (تأثير الفضاء) --- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000 url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.8;
            animation: moveBackground 100s linear infinite;
        }
        
        /* إضافة نجوم لامعة بالكود */
        .twinkling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
        }

        @keyframes moveBackground {
            from {background-position: 0 0;}
            to {background-position: 1000px 1000px;}
        }

        /* --- الشعار --- */
        .logo {
            text-align: center;
            padding: 40px 0 20px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* --- القائمة الرئيسية (Home View) --- */
        #home-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            transition: opacity 0.5s ease;
        }

        .menu-item {
            font-size: 1.5rem;
            margin: 15px 0;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .menu-item:hover {
            text-shadow: 0 0 15px #fff;
            transform: scale(1.1);
        }

        /* --- الكتالوج (Catalog View) --- */
        #catalog-view {
            display: none;
            padding: 20px;
            padding-bottom: 80px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .nav-back {
            font-size: 0.9rem;
            margin-bottom: 20px;
            cursor: pointer;
            color: #888;
            text-decoration: underline;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* عمودين للموبايل */
            gap: 15px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            position: relative;
            cursor: pointer;
        }

        .product-img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            background-color: #222; /* لون مؤقت مكان الصورة */
            border-radius: 5px;
            margin-bottom: 10px;
            object-fit: cover;
            /* فلتر لجعل الصور تبدو قديمة/داكنة مثل الفيديو */
            filter: contrast(1.2) brightness(0.9);
        }

        .sold-out-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #fff;
            color: #000;
            font-size: 0.7rem;
            padding: 2px 5px;
            font-weight: bold;
            border-radius: 3px;
        }

        .price {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 5px;
        }

        /* --- صفحة المنتج التفصيلية (Modal) --- */
        #product-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-img {
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .product-title {
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .product-price {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
        }

        .size-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .size-btn {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 10px 15px;
            cursor: pointer;
        }
        
        .size-btn.active {
            background: #fff;
            color: #000;
        }

        .add-btn {
            width: 100%;
            max-width: 400px;
            background: #fff;
            color: #000;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
        }

        /* تأثيرات إضافية */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            animation: scanline 10s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline {
            0% {bottom: 100%;}
            100% {bottom: -100px;}
        }

    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="twinkling"></div>
    <div class="scanline"></div>

    <div class="logo" onclick="goHome()">BRAND®</div>

    <div id="home-view">
        <div class="menu-item" onclick="showCatalog()">HOME</div>
        <div class="menu-item" onclick="showCatalog()">CATALOG</div>
        <div class="menu-item">CONTACT</div>
    </div>

    <div id="catalog-view">
        <div class="nav-back" onclick="goHome()">← BACK HOME</div>
        
        <div class="grid">
            <div class="product-card" onclick="openProduct('Vintage Hoodie 01', '999.00 EGP', 'https://via.placeholder.com/400x400/222/fff?text=HOODIE+1')">
                <div class="sold-out-badge">SOLD OUT</div>
                <img src="https://via.placeholder.com/400x400/222/fff?text=HOODIE+1" class="product-img">
                <div>VINTAGE WASH</div>
                <div class="price">LE 999.00 EGP</div>
            </div>

            <div class="product-card" onclick="openProduct('University Zip', '1200.00 EGP', 'https://via.placeholder.com/400x400/333/fff?text=HOODIE+2')">
                <img src="https://via.placeholder.com/400x400/333/fff?text=HOODIE+2" class="product-img">
                <div>UNIVERSITY ZIP</div>
                <div class="price">LE 1200.00 EGP</div>
            </div>

            <div class="product-card" onclick="openProduct('Star Jacket', '1500.00 EGP', 'https://via.placeholder.com/400x400/111/fff?text=JACKET')">
                <div class="sold-out-badge">SOLD OUT</div>
                <img src="https://via.placeholder.com/400x400/111/fff?text=JACKET" class="product-img">
                <div>STAR JACKET</div>
                <div class="price">LE 1500.00 EGP</div>
            </div>
             <div class="product-card" onclick="openProduct('Skull Tee', '600.00 EGP', 'https://via.placeholder.com/400x400/000/fff?text=TEE')">
                <img src="https://via.placeholder.com/400x400/000/fff?text=TEE" class="product-img">
                <div>SKULL TEE</div>
                <div class="price">LE 600.00 EGP</div>
            </div>
        </div>
    </div>

    <div id="product-modal">
        <div class="close-modal" onclick="closeProduct()">×</div>
        <div class="modal-content">
            <img id="modal-img" src="" class="modal-img">
            <div id="modal-title" class="product-title">PRODUCT NAME</div>
            <div id="modal-price" class="product-price">PRICE</div>

            <div class="size-selector">
                <button class="size-btn">S</button>
                <button class="size-btn active">M</button>
                <button class="size-btn">L</button>
                <button class="size-btn">XL</button>
            </div>

            <button class="add-btn">ADD TO CART</button>
            <br>
            <p style="font-size: 0.8rem; color: #666;">Ships in 3-5 business days.</p>
        </div>
    </div>

    <script>
        // المتغيرات للتحكم في العناصر
        const homeView = document.getElementById('home-view');
        const catalogView = document.getElementById('catalog-view');
        const productModal = document.getElementById('product-modal');

        // وظيفة لإظهار الكتالوج وإخفاء الرئيسية
        function showCatalog() {
            homeView.style.opacity = '0';
            setTimeout(() => {
                homeView.style.display = 'none';
                catalogView.style.display = 'block';
                setTimeout(() => {
                    catalogView.style.opacity = '1';
                }, 50);
            }, 500);
        }

        // وظيفة للعودة للرئيسية
        function goHome() {
            catalogView.style.opacity = '0';
            closeProduct(); // إغلاق المنتج إذا كان مفتوحاً
            setTimeout(() => {
                catalogView.style.display = 'none';
                homeView.style.display = 'flex';
                setTimeout(() => {
                    homeView.style.opacity = '1';
                }, 50);
            }, 500);
        }

        // فتح صفحة المنتج
        function openProduct(title, price, imgSrc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-price').innerText = price;
            document.getElementById('modal-img').src = imgSrc;
            
            productModal.style.display = 'block';
        }

        // إغلاق صفحة المنتج
        function closeProduct() {
            productModal.style.display = 'none';
        }

        // تفاعلية أزرار المقاسات
        const sizeBtns = document.querySelectorAll('.size-btn');
        sizeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                sizeBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
